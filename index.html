<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAIHCE Eval Dashboard</title>
<meta name="description" content="Interactive evaluation dashboard for CAIHCE — Conflict-Aware Iterative Hierarchy Compliance Evaluation across Claude model families.">
<meta property="og:title" content="CAIHCE Eval Dashboard">
<meta property="og:description" content="Per-model analysis of value hierarchy compliance across 4 judges, 6 conflict pairs, and 3 pressure tiers.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
  :root {
    --bg: #faf6f0;
    --card: #fff;
    --border: #e8e0d4;
    --text: #2c2416;
    --text2: #6b5e4f;
    --accent: #c97b2a;
    --accent-light: #f5e6d0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
  .container { max-width:1400px; margin:0 auto; padding:24px; }

  /* Header */
  .header { text-align:center; margin-bottom:32px; }
  .header h1 { font-size:28px; font-weight:700; letter-spacing:-0.5px; }
  .header p { color:var(--text2); font-size:14px; margin-top:4px; }

  /* Model tabs */
  .model-tabs { display:flex; gap:8px; justify-content:center; margin-bottom:28px; flex-wrap:wrap; }
  .model-tab { padding:10px 24px; border:2px solid var(--border); border-radius:10px; background:var(--card); cursor:pointer; font-size:14px; font-weight:600; transition:all .15s; }
  .model-tab:hover { border-color:var(--accent); }
  .model-tab.active { background:var(--accent); color:white; border-color:var(--accent); }

  /* Sections */
  .section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:24px; }
  .section-title { font-size:18px; font-weight:700; margin-bottom:4px; }
  .section-sub { font-size:13px; color:var(--text2); margin-bottom:16px; }

  /* Judge toggles */
  .judge-toggles { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .judge-btn { padding:7px 16px; border:2px solid var(--border); border-radius:8px; background:var(--card); cursor:pointer; font-size:13px; font-weight:600; transition:all .15s; }
  .judge-btn:hover { border-color:#aaa; }
  .judge-btn.active { border-color:#d4845a; background:#fff; color:#d4845a; }
  .judge-btn.all-btn.active { border-color:#555; background:#555; color:#fff; }

  /* Heatmap table */
  .heatmap-wrap { overflow-x:auto; }
  .heatmap { border-collapse:separate; border-spacing:4px; width:100%; }
  .heatmap th { font-size:12px; font-weight:600; color:#c97b5a; padding:4px 8px; text-align:center; white-space:nowrap; }
  .heatmap td { padding:8px 10px; text-align:center; border-radius:6px; font-size:14px; font-weight:600; min-width:52px; }
  .heatmap .row-label { text-align:left; font-weight:600; font-size:14px; color:var(--text); background:transparent; min-width:160px; }
  .heatmap .tier-header { font-size:13px; font-weight:700; text-align:center; padding-bottom:2px; }

  /* Pressure icons */
  .pressure-icon { display:inline-block; width:14px; height:14px; border-radius:50%; vertical-align:middle; margin-right:4px; }
  .pressure-icon.baseline { border:2px solid #888; background:transparent; }
  .pressure-icon.moderate { border:2px solid #888; background:linear-gradient(to right, #888 50%, transparent 50%); }
  .pressure-icon.high { border:2px solid #888; background:#888; }

  /* Bar chart */
  .bar-chart { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
  .bar-row { display:flex; align-items:center; gap:10px; }
  .bar-label { width:120px; font-size:13px; font-weight:600; text-align:right; flex-shrink:0; }
  .bar-track { flex:1; height:28px; background:#f0ebe3; border-radius:6px; position:relative; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; display:flex; align-items:center; padding-left:8px; font-size:12px; font-weight:700; color:#fff; transition:width .4s ease; }
  .bar-value { margin-left:8px; font-size:13px; font-weight:600; min-width:40px; }

  /* Stat cards */
  .stat-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .stat-card { background:var(--bg); border-radius:10px; padding:16px; flex:1; min-width:140px; text-align:center; }
  .stat-card .label { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
  .stat-card .value { font-size:28px; font-weight:700; margin-top:4px; }
  .stat-card .sub { font-size:12px; color:var(--text2); margin-top:2px; }

  /* Scatter plot (SVG-based) */
  .scatter-container { position:relative; margin:16px 0; }
  .scatter-container svg { display:block; }

  /* Quadrant grid */
  .quadrant-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
  .quadrant { background:var(--bg); border-radius:10px; padding:16px; text-align:center; }
  .quadrant .q-label { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
  .quadrant .q-value { font-size:32px; font-weight:700; margin-top:4px; }
  .quadrant .q-pct { font-size:14px; color:var(--text2); }
  .quadrant .q-desc { font-size:12px; color:var(--text2); margin-top:4px; }

  /* Tooltip */
  .tooltip { position:absolute; background:#333; color:#fff; padding:6px 10px; border-radius:6px; font-size:12px; pointer-events:none; z-index:100; white-space:nowrap; }

  /* Family bias indicator */
  .bias-indicator { display:flex; align-items:center; justify-content:center; gap:16px; margin:16px 0; }
  .bias-arrow { font-size:40px; font-weight:700; }
  .bias-delta { font-size:14px; color:var(--text2); }

  /* Legend */
  .legend { display:flex; gap:20px; margin-bottom:12px; align-items:center; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text2); }
  .legend-swatch { width:14px; height:14px; border-radius:3px; }

  .no-data { text-align:center; color:var(--text2); font-style:italic; padding:32px; }

  /* Pair labels formatting */
  .pair-nice { font-size:14px; }
</style>
</head>

const PAIR_ORDER = ['safety_vs_ethics','safety_vs_compliance','safety_vs_helpfulness','ethics_vs_compliance','ethics_vs_helpfulness','compliance_vs_helpfulness'];
const TIER_ORDER = ['Safety','Ethics','Compliance','Helpfulness'];

function scoreColor(v, min=0, max=5) {
  if (v == null) return '#eae5dc';
  const t = Math.max(0, Math.min(1, (v - min) / (max - min)));
  // Matches screenshot: red(low) -> salmon -> peach -> pale yellow -> light green -> green(high)
  const stops = [
    [0.00, 220, 88, 82],   // red
    [0.30, 232, 150, 120],  // salmon
    [0.50, 240, 205, 150],  // warm yellow
    [0.70, 200, 222, 160],  // pale green
    [0.85, 140, 205, 140],  // medium green
    [1.00, 100, 190, 120],  // green
  ];
  let i = 0;
  for (let k = 0; k < stops.length - 1; k++) {
    if (t >= stops[k][0] && t <= stops[k+1][0]) { i = k; break; }
  }
  const [t0, r0, g0, b0] = stops[i];
  const [t1, r1, g1, b1] = stops[i+1];
  const u = (t - t0) / (t1 - t0);
  const r = Math.round(r0 + (r1 - r0) * u);
  const g = Math.round(g0 + (g1 - g0) * u);
  const b = Math.round(b0 + (b1 - b0) * u);
  return `rgb(${r},${g},${b})`;
}

function textColorForBg(v) {
  return (v != null && v < 1.5) ? '#fff' : '#3d3226';
}

// State
let currentModel = Object.keys(DATA)[0];
let judgeStates = {}; // per section judge selection

function init() {
  // Initialize judge states for each section
  const models = Object.keys(DATA);
  models.forEach(m => {
    judgeStates[m] = {};
    ['heatmap','tier','harshness','family','agreement','distance','falseconf'].forEach(sec => {
      judgeStates[m][sec] = 'all';
    });
  });
  render();
}

function setModel(m) {
  currentModel = m;
  render();
}

function setJudge(section, judge) {
  judgeStates[currentModel][section] = judge;
  render();
}

function render() {
  const d = DATA[currentModel];
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="header">
      <h1>CAIHCE Evaluation Dashboard</h1>
      <p>Per-model analysis across 4 judges, 6 conflict pairs, 3 pressure tiers</p>
    </div>

    <div class="model-tabs">
      ${Object.keys(DATA).map(m => `
        <div class="model-tab ${m === currentModel ? 'active' : ''}" onclick="setModel('${m}')">
          ${MODEL_LABELS[m]}
        </div>
      `).join('')}
    </div>

    ${renderHeatmap(d)}
    ${renderTierStrength(d)}
    ${renderJudgeHarshness(d)}
    ${renderFamilyBias(d)}
    ${renderDimensionAgreement(d)}
    ${renderTierDistance(d)}
    ${renderFalseConfidence(d)}
  `;
}

function judgeToggles(section, judges, includeAll=true) {
  const current = judgeStates[currentModel][section];
  let btns = '';
  if (includeAll) {
    btns += `<div class="judge-btn all-btn ${current === 'all' ? 'active' : ''}" onclick="setJudge('${section}','all')">All Judges</div>`;
  }
  judges.forEach(j => {
    btns += `<div class="judge-btn ${current === j ? 'active' : ''}" onclick="setJudge('${section}','${j}')">${JUDGE_LABELS[j]}</div>`;
  });
  return `<div class="judge-toggles">${btns}</div>`;
}

// ===================== Q1: SCORE HEATMAP =====================
function renderHeatmap(d) {
  const sec = 'heatmap';
  const judge = judgeStates[currentModel][sec];
  const judges = d.judges;

  let tableHTML = '';
  if (judge === 'all') {
    // Average across all judges - compute from individual judge data
    const avgRows = PAIR_ORDER.map(pair => {
      const row = {pair};
      ['baseline','moderate','high'].forEach(tier => {
        ['D1','D2','D3'].forEach(dim => {
          const key = `${tier}_${dim}`;
          let vals = judges.map(j => {
            const jr = d.heatmap[j].find(r => r.pair === pair);
            return jr ? jr[key] : null;
          }).filter(v => v != null);
          row[key] = vals.length > 0 ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length * 100)/100 : null;
        });
      });
      return row;
    });
    tableHTML = buildHeatmapTable(avgRows, 'All judges averaged');
  } else {
    const rows = d.heatmap[judge] || [];
    const ordered = PAIR_ORDER.map(p => rows.find(r => r.pair === p)).filter(Boolean);
    tableHTML = buildHeatmapTable(ordered, JUDGE_LABELS[judge]);
  }

  return `
    <div class="section">
      <div class="section-title">Score Heatmap &mdash; ${MODEL_LABELS[currentModel]}</div>
      <div class="section-sub">All 54 cells per judge. Green = high, red = low.</div>
      ${judgeToggles(sec, judges)}
      <div class="heatmap-wrap">${tableHTML}</div>
    </div>
  `;
}

function buildHeatmapTable(rows, subtitle) {
  return `
    <table class="heatmap">
      <thead>
        <tr>
          <th></th>
          <th colspan="3" class="tier-header"><span class="pressure-icon baseline"></span> Baseline</th>
          <th colspan="3" class="tier-header"><span class="pressure-icon moderate"></span> Moderate</th>
          <th colspan="3" class="tier-header"><span class="pressure-icon high"></span> High</th>
        </tr>
        <tr>
          <th></th>
          <th>D1</th><th>D2</th><th>D3</th>
          <th>D1</th><th>D2</th><th>D3</th>
          <th>D1</th><th>D2</th><th>D3</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td class="row-label">${PAIR_LABELS[r.pair] || r.pair}</td>
            ${['baseline','moderate','high'].map(tier =>
              ['D1','D2','D3'].map(dim => {
                const v = r[`${tier}_${dim}`];
                const display = v != null ? v.toFixed(2) : '—';
                return `<td style="background:${scoreColor(v)};color:${textColorForBg(v)}">${display}</td>`;
              }).join('')
            ).join('')}
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ===================== Q1: TIER STRENGTH =====================
function renderTierStrength(d) {
  const sec = 'tier';
  const judge = judgeStates[currentModel][sec];
  const judges = d.judges;

  // Compute per-conflict-pair composite from heatmap data
  function getPairScores(judgeKey) {
    if (judgeKey === 'all') {
      return PAIR_ORDER.map(pair => {
        let d1s=[], d2s=[], d3s=[];
        judges.forEach(j => {
          const row = d.heatmap[j].find(r => r.pair === pair);
          if (!row) return;
          ['baseline','moderate','high'].forEach(tier => {
            if (row[tier+'_D1'] != null) d1s.push(row[tier+'_D1']);
            if (row[tier+'_D2'] != null) d2s.push(row[tier+'_D2']);
            if (row[tier+'_D3'] != null) d3s.push(row[tier+'_D3']);
          });
        });
        const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
        const d1 = avg(d1s), d2 = avg(d2s), d3 = avg(d3s);
        return {pair, D1:d1, D2:d2, D3:d3, composite:(d1+d2+d3)/3};
      });
    } else {
      const rows = d.heatmap[judgeKey] || [];
      return PAIR_ORDER.map(pair => {
        const row = rows.find(r => r.pair === pair);
        if (!row) return {pair, D1:0,D2:0,D3:0,composite:0};
        let d1s=[], d2s=[], d3s=[];
        ['baseline','moderate','high'].forEach(tier => {
          if (row[tier+'_D1'] != null) d1s.push(row[tier+'_D1']);
          if (row[tier+'_D2'] != null) d2s.push(row[tier+'_D2']);
          if (row[tier+'_D3'] != null) d3s.push(row[tier+'_D3']);
        });
        const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
        const d1 = avg(d1s), d2 = avg(d2s), d3 = avg(d3s);
        return {pair, D1:d1, D2:d2, D3:d3, composite:(d1+d2+d3)/3};
      });
    }
  }

  const pairScores = getPairScores(judge);
  const sorted = [...pairScores].sort((a,b) => b.composite - a.composite);
  const strongest = sorted[0];
  const weakest = sorted[sorted.length - 1];

  const barColor = p => p.pair === strongest.pair ? '#5ab88a' : p.pair === weakest.pair ? '#d4735a' : '#d4a84a';

  return `
    <div class="section">
      <div class="section-title">Q1: Conflict Pair Strength</div>
      <div class="section-sub">Which conflict pair does the model handle best/worst? Composite averaged across all pressure tiers.</div>
      ${judgeToggles(sec, judges)}
      <div class="stat-row">
        <div class="stat-card" style="border-left:4px solid #5ab88a">
          <div class="label">Strongest Conflict</div>
          <div class="value" style="color:#5ab88a;font-size:18px">${PAIR_LABELS[strongest.pair]}</div>
          <div class="sub">Composite: ${strongest.composite.toFixed(2)}</div>
        </div>
        <div class="stat-card" style="border-left:4px solid #d4735a">
          <div class="label">Weakest Conflict</div>
          <div class="value" style="color:#d4735a;font-size:18px">${PAIR_LABELS[weakest.pair]}</div>
          <div class="sub">Composite: ${weakest.composite.toFixed(2)}</div>
        </div>
      </div>
      <div class="bar-chart">
        ${sorted.map(p => {
          const pct = (p.composite / 5) * 100;
          return `
            <div class="bar-row">
              <div class="bar-label" style="width:170px">${PAIR_LABELS[p.pair]}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${barColor(p)}">${p.composite.toFixed(2)}</div>
              </div>
              <div class="bar-value" style="font-size:11px;color:var(--text2)">D1:${p.D1.toFixed(2)} D2:${p.D2.toFixed(2)} D3:${p.D3.toFixed(2)}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ===================== Q2: JUDGE HARSHNESS =====================
function renderJudgeHarshness(d) {
  const jh = d.judge_harshness;
  const judges = Object.keys(jh);

  let harshest = judges[0], most_lenient = judges[0];
  judges.forEach(j => {
    if (jh[j].composite < jh[harshest].composite) harshest = j;
    if (jh[j].composite > jh[most_lenient].composite) most_lenient = j;
  });

  const sorted = [...judges].sort((a,b) => jh[a].composite - jh[b].composite);

  return `
    <div class="section">
      <div class="section-title">Q2: Judge Harshness</div>
      <div class="section-sub">Lower average composite = harsher judge. Ranked from harshest to most lenient.</div>
      <div class="stat-row">
        <div class="stat-card" style="border-left:4px solid #d4735a">
          <div class="label">Harshest</div>
          <div class="value" style="color:#d4735a;font-size:20px">${JUDGE_LABELS[harshest]}</div>
          <div class="sub">Avg composite: ${jh[harshest].composite.toFixed(3)}</div>
        </div>
        <div class="stat-card" style="border-left:4px solid #5ab88a">
          <div class="label">Most Lenient</div>
          <div class="value" style="color:#5ab88a;font-size:20px">${JUDGE_LABELS[most_lenient]}</div>
          <div class="sub">Avg composite: ${jh[most_lenient].composite.toFixed(3)}</div>
        </div>
      </div>
      <div class="bar-chart">
        ${sorted.map(j => {
          const pct = (jh[j].composite / 5) * 100;
          const color = j === harshest ? '#d4735a' : j === most_lenient ? '#5ab88a' : '#d4a84a';
          return `
            <div class="bar-row">
              <div class="bar-label">${JUDGE_LABELS[j]}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${color}">${jh[j].composite.toFixed(3)}</div>
              </div>
              <div class="bar-value" style="font-size:11px;color:var(--text2)">D1:${jh[j].D1.toFixed(2)} D2:${jh[j].D2.toFixed(2)} D3:${jh[j].D3.toFixed(2)}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ===================== Q3: FAMILY BIAS =====================
function renderFamilyBias(d) {
  const fb = d.family_bias;

  if (!fb) {
    return `
      <div class="section">
        <div class="section-title">Q3: Same-Family Judge Bias</div>
        <div class="section-sub">Does a judge from the same model family (e.g., Opus judging Opus) over- or under-score?</div>
        <div class="no-data">No same-family judge available for ${MODEL_LABELS[currentModel]}. (Haiku has no Haiku judge in this eval.)</div>
      </div>
    `;
  }

  const delta = fb.delta_composite;
  const direction = delta > 0 ? 'OVERSCORES' : delta < 0 ? 'UNDERSCORES' : 'NEUTRAL';
  const dirColor = delta > 0 ? '#5ab88a' : delta < 0 ? '#d4735a' : '#888';
  const arrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';

  // Build per-judge comparison
  const judges = Object.keys(fb.per_judge);

  return `
    <div class="section">
      <div class="section-title">Q3: Same-Family Judge Bias</div>
      <div class="section-sub">Does ${JUDGE_LABELS[fb.same_family_judge]} (same family) over- or under-score ${MODEL_LABELS[currentModel]}?</div>
      <div class="bias-indicator">
        <div style="text-align:center">
          <div class="bias-arrow" style="color:${dirColor}">${arrow} ${direction}</div>
          <div style="font-size:36px;font-weight:700;color:${dirColor}">${delta > 0 ? '+' : ''}${delta.toFixed(3)}</div>
          <div class="bias-delta">composite delta (same-family vs. other judges avg)</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-card" style="border-left:4px solid ${dirColor}">
          <div class="label">${JUDGE_LABELS[fb.same_family_judge]} (Same Family)</div>
          <div class="value" style="font-size:22px">${fb.same_family_composite.toFixed(3)}</div>
          <div class="sub">D1: ${fb.same_family_D1.toFixed(2)} / D2: ${fb.same_family_D2.toFixed(2)} / D3: ${fb.same_family_D3.toFixed(2)}</div>
        </div>
        <div class="stat-card" style="border-left:4px solid #888">
          <div class="label">Other Judges Avg</div>
          <div class="value" style="font-size:22px">${fb.other_judges_composite.toFixed(3)}</div>
          <div class="sub">D1: ${fb.other_judges_D1.toFixed(2)} / D2: ${fb.other_judges_D2.toFixed(2)} / D3: ${fb.other_judges_D3.toFixed(2)}</div>
        </div>
      </div>
      <div style="margin-top:12px;">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;">Per-dimension deltas</div>
        <div class="stat-row">
          <div class="stat-card">
            <div class="label">ΔD1 (Priority)</div>
            <div class="value" style="font-size:22px;color:${fb.delta_D1 > 0 ? '#5ab88a' : fb.delta_D1 < 0 ? '#d4735a' : '#888'}">${fb.delta_D1 > 0 ? '+' : ''}${fb.delta_D1.toFixed(3)}</div>
          </div>
          <div class="stat-card">
            <div class="label">ΔD2 (Reasoning)</div>
            <div class="value" style="font-size:22px;color:${fb.delta_D2 > 0 ? '#5ab88a' : fb.delta_D2 < 0 ? '#d4735a' : '#888'}">${fb.delta_D2 > 0 ? '+' : ''}${fb.delta_D2.toFixed(3)}</div>
          </div>
          <div class="stat-card">
            <div class="label">ΔD3 (Robustness)</div>
            <div class="value" style="font-size:22px;color:${fb.delta_D3 > 0 ? '#5ab88a' : fb.delta_D3 < 0 ? '#d4735a' : '#888'}">${fb.delta_D3 > 0 ? '+' : ''}${fb.delta_D3.toFixed(3)}</div>
          </div>
        </div>
      </div>
      <div style="margin-top:8px;">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;">All judges comparison (composite)</div>
        <div class="bar-chart">
          ${judges.sort((a,b) => fb.per_judge[b] - fb.per_judge[a]).map(j => {
            const v = fb.per_judge[j];
            const pct = (v / 5) * 100;
            const isFam = j === fb.same_family_judge;
            return `
              <div class="bar-row">
                <div class="bar-label">${JUDGE_LABELS[j]}${isFam ? ' ★' : ''}</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${pct}%;background:${isFam ? dirColor : '#b8a88a'}">${v.toFixed(3)}</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px;">★ = same-family judge</div>
      </div>
    </div>
  `;
}

// ===================== Q4: DIMENSION AGREEMENT =====================
function renderDimensionAgreement(d) {
  const da = d.dimension_agreement;
  const dims = [
    {key:'D1', label:'D1 — Priority', mean: da.D1_mean_std, median: da.D1_median_std},
    {key:'D2', label:'D2 — Reasoning', mean: da.D2_mean_std, median: da.D2_median_std},
    {key:'D3', label:'D3 — Robustness', mean: da.D3_mean_std, median: da.D3_median_std}
  ];

  const sorted = [...dims].sort((a,b) => a.mean - b.mean);
  const mostAgree = sorted[0];
  const mostDisagree = sorted[sorted.length - 1];

  return `
    <div class="section">
      <div class="section-title">Q4: Dimension Agreement Across Judges</div>
      <div class="section-sub">Lower cross-judge standard deviation = more agreement. Computed per scenario, then averaged.</div>
      <div class="stat-row">
        <div class="stat-card" style="border-left:4px solid #5ab88a">
          <div class="label">Most Agreement</div>
          <div class="value" style="color:#5ab88a;font-size:20px">${mostAgree.label}</div>
          <div class="sub">Mean σ = ${mostAgree.mean.toFixed(3)}</div>
        </div>
        <div class="stat-card" style="border-left:4px solid #d4735a">
          <div class="label">Most Disagreement</div>
          <div class="value" style="color:#d4735a;font-size:20px">${mostDisagree.label}</div>
          <div class="sub">Mean σ = ${mostDisagree.mean.toFixed(3)}</div>
        </div>
      </div>
      <div class="bar-chart">
        ${sorted.map(dim => {
          const maxStd = 1.5;
          const pct = Math.min(100, (dim.mean / maxStd) * 100);
          const color = dim === mostAgree ? '#5ab88a' : dim === mostDisagree ? '#d4735a' : '#d4a84a';
          return `
            <div class="bar-row">
              <div class="bar-label">${dim.label}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${pct}%;background:${color}">σ = ${dim.mean.toFixed(3)}</div>
              </div>
              <div class="bar-value" style="font-size:11px;color:var(--text2)">median: ${dim.median.toFixed(3)}</div>
            </div>
          `;
        }).join('')}
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--text2);">
        Interpretation: ${mostAgree.key} shows judges mostly converge (σ=${mostAgree.mean.toFixed(3)}), while ${mostDisagree.key} reveals the most subjective dimension (σ=${mostDisagree.mean.toFixed(3)}).
        The spread ratio is ${(mostDisagree.mean / mostAgree.mean).toFixed(1)}×.
      </div>
    </div>
  `;
}

// ===================== Q5: TIER DISTANCE VS COMPLIANCE =====================
function renderTierDistance(d) {
  const sec = 'distance';
  const judge = judgeStates[currentModel][sec];
  const judges = d.judges;
  const items = d.tier_distance[judge] || d.tier_distance['all'];

  // Group by gap
  const byGap = {};
  items.forEach(it => {
    if (!byGap[it.gap]) byGap[it.gap] = [];
    byGap[it.gap].push(it);
  });

  // Compute gap averages
  const gapAvgs = [1,2,3].map(g => {
    const group = byGap[g] || [];
    const avgD1 = group.length > 0 ? group.reduce((s,i)=>s+i.D1_mean,0)/group.length : 0;
    return {gap:g, D1:avgD1, pairs:group};
  });

  // SVG scatter
  const W = 700, H = 300, pad = {l:60,r:20,t:20,b:50};
  const plotW = W-pad.l-pad.r, plotH = H-pad.t-pad.b;

  const xScale = g => pad.l + ((g - 0.5) / 3.5) * plotW;
  const yScale = v => pad.t + plotH - ((v - 2) / 3) * plotH;

  const gapColors = {1:'#d4a84a', 2:'#b89470', 3:'#5ab88a'};
  const gapLabels = {
    1: 'T1↔T2, T2↔T3, T3↔T4',
    2: 'T1↔T3, T2↔T4',
    3: 'T1↔T4'
  };

  let dots = '';
  items.forEach(it => {
    const cx = xScale(it.gap) + (Math.random()-0.5)*30;
    const cy = yScale(it.D1_mean);
    dots += `<circle cx="${cx}" cy="${cy}" r="6" fill="${gapColors[it.gap]}" opacity="0.8" stroke="#fff" stroke-width="1.5"/>`;
  });

  // Trend line through gap averages
  let trendLine = '';
  if (gapAvgs.length >= 2) {
    const pts = gapAvgs.filter(g=>g.pairs.length>0).map(g => `${xScale(g.gap)},${yScale(g.D1)}`).join(' ');
    trendLine = `<polyline points="${pts}" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="6,4"/>`;
    gapAvgs.filter(g=>g.pairs.length>0).forEach(g => {
      trendLine += `<circle cx="${xScale(g.gap)}" cy="${yScale(g.D1)}" r="8" fill="#333"/>`;
      trendLine += `<text x="${xScale(g.gap)+12}" y="${yScale(g.D1)+4}" font-size="12" font-weight="700" fill="#333">${g.D1.toFixed(2)}</text>`;
    });
  }

  // Determine pattern
  const d1_vals = gapAvgs.filter(g=>g.pairs.length>0).map(g=>g.D1);
  let pattern = '';
  if (d1_vals.length >= 3) {
    const diff12 = d1_vals[1] - d1_vals[0];
    const diff23 = d1_vals[2] - d1_vals[1];
    if (diff12 > 0.05 && diff23 > 0.05) pattern = 'Linear improvement — compliance scales with tier distance.';
    else if (diff12 > 0.1 && diff23 < 0.05) pattern = 'Threshold effect — big jump from 1-gap to 2-gap, then plateau. Suggests a learned hierarchy with a ceiling.';
    else if (diff12 < 0.05 && diff23 > 0.1) pattern = 'Late threshold — 1-gap and 2-gap similar, then big jump at 3-gap. May indicate binary safety-vs-rest reflex.';
    else if (Math.abs(diff12) < 0.05 && Math.abs(diff23) < 0.05) pattern = 'Flat — compliance doesn\'t vary with tier distance. Model may treat all conflicts similarly.';
    else pattern = `Mixed pattern (Δ1→2: ${diff12>0?'+':''}${diff12.toFixed(3)}, Δ2→3: ${diff23>0?'+':''}${diff23.toFixed(3)}).`;
  }

  return `
    <div class="section">
      <div class="section-title">Q5: Tier Distance vs Compliance</div>
      <div class="section-sub">Does the gap between tiers predict how well the model gets D1 right? 1-gap pairs (e.g., Safety↔Ethics), 2-gap (Safety↔Compliance), 3-gap (Safety↔Helpfulness).</div>
      ${judgeToggles(sec, judges)}
      <div class="scatter-container">
        <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%;height:auto;">
          <!-- Grid -->
          ${[2,3,4,5].map(v => `
            <line x1="${pad.l}" y1="${yScale(v)}" x2="${W-pad.r}" y2="${yScale(v)}" stroke="#e8e0d4" stroke-width="1"/>
            <text x="${pad.l-8}" y="${yScale(v)+4}" text-anchor="end" font-size="11" fill="#6b5e4f">${v.toFixed(1)}</text>
          `).join('')}
          ${[1,2,3].map(g => `
            <line x1="${xScale(g)}" y1="${pad.t}" x2="${xScale(g)}" y2="${H-pad.b}" stroke="#e8e0d4" stroke-width="1"/>
            <text x="${xScale(g)}" y="${H-pad.b+16}" text-anchor="middle" font-size="12" font-weight="600" fill="#6b5e4f">${g}-gap</text>
            <text x="${xScale(g)}" y="${H-pad.b+30}" text-anchor="middle" font-size="9" fill="#999">${gapLabels[g]}</text>
          `).join('')}
          <!-- Axes labels -->
          <text x="${pad.l + plotW/2}" y="${H-2}" text-anchor="middle" font-size="12" fill="#6b5e4f">Tier Distance (gap size)</text>
          <text x="14" y="${pad.t + plotH/2}" text-anchor="middle" font-size="12" fill="#6b5e4f" transform="rotate(-90 14 ${pad.t+plotH/2})">D1 Mean</text>
          ${dots}
          ${trendLine}
        </svg>
      </div>
      ${pattern ? `<div style="background:var(--bg);padding:12px 16px;border-radius:8px;font-size:13px;margin-top:8px;">
        <strong>Pattern detected:</strong> ${pattern}
      </div>` : ''}
      <div style="margin-top:12px;">
        <table class="heatmap" style="border-spacing:4px;">
          <thead>
            <tr><th>Gap</th><th>Pairs</th><th>Avg D1</th><th>Avg Composite</th></tr>
          </thead>
          <tbody>
            ${gapAvgs.filter(g=>g.pairs.length>0).map(g => `
              <tr>
                <td style="background:${gapColors[g.gap]};color:#fff;border-radius:6px;font-weight:700">${g.gap}-gap</td>
                <td class="row-label" style="font-size:12px">${g.pairs.map(p=>PAIR_LABELS[p.pair]).join(', ')}</td>
                <td style="background:${scoreColor(g.D1)};border-radius:6px;font-weight:600">${g.D1.toFixed(3)}</td>
                <td style="background:${scoreColor(g.pairs.reduce((s,p)=>s+p.composite_mean,0)/g.pairs.length)};border-radius:6px;font-weight:600">${(g.pairs.reduce((s,p)=>s+p.composite_mean,0)/g.pairs.length).toFixed(3)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ===================== Q6: FALSE CONFIDENCE =====================
function renderFalseConfidence(d) {
  const sec = 'falseconf';
  const judge = judgeStates[currentModel][sec];
  const judges = d.judges;
  const fc = d.false_confidence[judge] || d.false_confidence['all'];

  const quadrants = [
    {key:'both_high', label:'Both High', desc:'D1≥4 & D2≥4 — Correct + well-reasoned', color:'#5ab88a', emoji:'✓'},
    {key:'false_confidence', label:'False Confidence', desc:'D1≥4 & D2≤2 — Right answer, poor reasoning', color:'#d4a84a', emoji:'⚠'},
    {key:'eloquent_wrong', label:'Eloquent Wrong', desc:'D1≤2 & D2≥4 — Wrong answer, articulate reasoning', color:'#d4735a', emoji:'✗'},
    {key:'both_low', label:'Both Low', desc:'D1≤2 & D2≤2 — Wrong + poor reasoning', color:'#9a7a6a', emoji:'✗✗'}
  ];

  return `
    <div class="section">
      <div class="section-title">Q6: False Confidence & Eloquent Wrong Patterns</div>
      <div class="section-sub">How often does the model get the right answer for the wrong reason (or vice versa)? Out of ${fc.total} scored responses.</div>
      ${judgeToggles(sec, judges)}
      <div class="quadrant-grid">
        ${quadrants.map(q => {
          const data = fc[q.key];
          return `
            <div class="quadrant" style="border-left:4px solid ${q.color}">
              <div class="q-label">${q.emoji} ${q.label}</div>
              <div class="q-value" style="color:${q.color}">${data.count}</div>
              <div class="q-pct">${data.pct}% of responses</div>
              <div class="q-desc">${q.desc}</div>
            </div>
          `;
        }).join('')}
      </div>
      <div style="margin-top:16px;">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;">Breakdown by conflict pair</div>
        <table class="heatmap" style="border-spacing:4px;">
          <thead>
            <tr>
              <th></th>
              <th>n</th>
              <th style="color:#d4a84a">False Conf</th>
              <th style="color:#d4a84a">%</th>
              <th style="color:#d4735a">Eloquent Wrong</th>
              <th style="color:#d4735a">%</th>
            </tr>
          </thead>
          <tbody>
            ${PAIR_ORDER.map(p => {
              const bp = fc.by_pair[p];
              if (!bp) return '';
              return `
                <tr>
                  <td class="row-label">${PAIR_LABELS[p]}</td>
                  <td style="background:#f5f0e8;border-radius:6px">${bp.total}</td>
                  <td style="background:${bp.false_confidence > 0 ? '#f5e6d0' : '#f5f0e8'};border-radius:6px;font-weight:600">${bp.false_confidence}</td>
                  <td style="background:${bp.fc_pct > 5 ? '#f0e0d2' : '#f5f0e8'};border-radius:6px">${bp.fc_pct}%</td>
                  <td style="background:${bp.eloquent_wrong > 0 ? '#f0dcd6' : '#f5f0e8'};border-radius:6px;font-weight:600">${bp.eloquent_wrong}</td>
                  <td style="background:${bp.ew_pct > 5 ? '#edd4cc' : '#f5f0e8'};border-radius:6px">${bp.ew_pct}%</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

init();
</script>
